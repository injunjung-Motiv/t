<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Christmas Memo 🎄</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <h1>Christmas Memos 🎅</h1>
            <p class="subtitle">Capture your holiday wishes ✨</p>
        </header>

        <div class="input-area">
            <textarea id="memo-input" placeholder="Write a wish or a memo..."></textarea>
            <button id="add-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Add Memo
            </button>
        </div>

        <div id="memo-list" class="memo-list">
            <!-- Memos will appear here -->
        </div>
    </div>

    <div class="flying-santa">
        <span class="rudolph">🦌</span>
        <span class="sleigh-group">
            <span class="sleigh">🛷</span>
            <span class="batman">🦇</span>
        </span>
    </div>
    <script src="script.js"></script>
</body>

</html>
